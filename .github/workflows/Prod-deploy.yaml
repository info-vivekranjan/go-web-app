name: Prod deploy
on:
  push:
    branches:
      - master
    paths-ignore:
      - "go-web-app-helm/**"
      - "k8s/**"
      - "README.md"
      - "argocd_deployment/**"
      - "Readme-local.md"

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Go 1.22
        uses: actions/setup-go@v2
        with:
          go-version: 1.22
      - name: Build go app
        run: go build -o go-web-app
      - name: Test
        run: go test .

  push:
    runs-on: ubuntu-24.04
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/go-app:${{ github.run_id }} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/go-app:${{ github.run_id }}

  update-new-tag-helm:
    runs-on: ubuntu-24.04
    needs: push
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.TOKEN }}
      - name: Update tag in helm chart
        run: |
          sed -i "s/tag: .*/tag: \"${{ github.run_id }}\"/" go-web-app-helm/values.yaml

      - name: Commit and push changes
        run: |
          git config user.name "info-vivekranjan"
          git config user.email "infovivek.ranjan@gmail.com"
          git add go-web-app-helm/values.yaml
          git commit -m "Updated Helm values image tag"
          git push
